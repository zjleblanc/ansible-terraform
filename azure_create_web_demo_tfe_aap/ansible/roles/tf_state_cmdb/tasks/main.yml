---
- name: Derive tf_state_resources from full Terraform state JSON (optional)
  when: tf_state_json is not none
  block:
    - name: Reset accumulator for module walk
      ansible.builtin.set_fact:
        _tf_state_cmdb_accum_resources: []

    - name: Walk root_module and child_modules for managed resources
      when: tf_state_cmdb_flatten_child_modules | bool
      ansible.builtin.include_tasks: tf_state_walk.yml
      vars:
        __tf_module: "{{ tf_state_json['values']['root_module'] }}"

    - name: Apply flattened resource list
      when: tf_state_cmdb_flatten_child_modules | bool
      ansible.builtin.set_fact:
        tf_state_resources: "{{ _tf_state_cmdb_accum_resources }}"

    - name: Use root module resources only (no child_modules walk)
      when: not (tf_state_cmdb_flatten_child_modules | bool)
      ansible.builtin.set_fact:
        tf_state_resources: "{{ tf_state_json['values']['root_module']['resources'] | default([]) }}"

# File-backed maps: role defaults/ merge eagerly templates dict values; include_vars from YAML does not.

- name: Set subnet parent vnet index
  ansible.builtin.set_fact:
    tf_state_cmdb_subnet_parent_vnet_by_address: {}

- name: Index subnet address to parent vnet
  loop: "{{ tf_state_cmdb_subnets }}"
  loop_control:
    label: "{{ item.address }}"
  vars:
    _subnet_parent_vnet: >-
      {{
        (
          tf_state_cmdb_vnets
          | selectattr('values.resource_group_name', 'equalto', item['values']['resource_group_name'])
          | selectattr('values.name', 'equalto', item['values']['virtual_network_name'])
          | list
          | first
        ) | default(none, true)
      }}
  ansible.builtin.set_fact:
    tf_state_cmdb_subnet_parent_vnet_by_address: "{{ tf_state_cmdb_subnet_parent_vnet_by_address | combine({ item.address: _subnet_parent_vnet }) }}"

# --- Configuration items (files/ci_maps/<type>.yml)
- name: Initialize CMDB accumulators
  ansible.builtin.set_fact:
    _sn_configuration_items: []
    _sn_ci_relationships: []

# Use |- (not >-) so YAML does not fold newlines into spaces between Jinja tags (which produced the string " []").
# Build queue with Ansible loops (not one giant set_fact Jinja): subscripting sn_manage_resource_maps in a
# template that Ansible parses before Jinja loop/bind runs leaves _resource undefined for nested {{ }}.
- name: Initialize CI work queue
  ansible.builtin.set_fact:
    _ci_work_queue: []

- name: Accumulate CI work queue by Terraform type
  ansible.builtin.include_tasks: accumulate_ci_queue.yml
  loop: "{{ sn_manage_resource_map_types | default([]) }}"
  loop_control:
    loop_var: map_type_item

- name: Build configuration items from CI work queue
  loop: "{{ _ci_work_queue | default([]) }}"
  loop_control:
    loop_var: _ci_work
    label: "{{ _ci_work.resource.address }}"
  vars:
    _resource: "{{ _ci_work.resource }}"
    _ci_tpl: "{{ _ci_work.tpl }}"
  ansible.builtin.include_tasks: sn_ci_build.yml

# --- Direct relationships (files/rel_maps/<type>.yml)
- name: Initialize relationship work queue
  ansible.builtin.set_fact:
    _rel_work_queue: []

- name: Accumulate relationship work queue by Terraform type
  ansible.builtin.include_tasks: accumulate_rel_queue.yml
  loop: "{{ sn_manage_relationship_map_types | default([]) }}"
  loop_control:
    loop_var: rel_type_item

- name: Append direct relationships from relationship work queue
  when: _rel_item.relationship_when | default(true)
  loop: "{{ _rel_work_queue | default([]) }}"
  loop_control:
    label: "{{ item.resource.address }}"
  vars:
    _resource: "{{ item.resource }}"
    _rel_item: "{{ item.rel }}"
    _rel_row:
      parent: "{{ _rel_item.parent }}"
      parent_type: "{{ _rel_item.parent_type }}"
      type: "{{ _rel_item.type }}"
      child: "{{ _rel_item.child }}"
      child_type: "{{ _rel_item.child_type }}"
  ansible.builtin.set_fact:
    _sn_ci_relationships: "{{ _sn_ci_relationships + [_rel_row] }}"

# --- Subelement relationships (files/subelement_maps/, one spec per file)
- name: Initialize subelement relationship work queue
  ansible.builtin.set_fact:
    _sub_rel_work_queue: []

- name: Accumulate subelement relationship work queue
  ansible.builtin.include_tasks: accumulate_sub_rel_one_spec.yml
  loop: "{{ sn_manage_relationship_subelement_spec_names | default([]) }}"
  loop_control:
    loop_var: sub_rel_spec_name

- name: Append subelement relationships from subelement work queue
  loop: "{{ _sub_rel_work_queue | default([]) }}"
  loop_control:
    label: "{{ item.resource.address }}"
  vars:
    _resource: "{{ item.resource }}"
    _item: "{{ item.item }}"
    _rel_item: "{{ item.rel }}"
    _rel_row:
      parent: "{{ _rel_item.parent }}"
      parent_type: "{{ _rel_item.parent_type }}"
      type: "{{ _rel_item.type }}"
      child: "{{ _rel_item.child }}"
      child_type: "{{ _rel_item.child_type }}"
  ansible.builtin.set_fact:
    _sn_ci_relationships: "{{ _sn_ci_relationships + [_rel_row] }}"

- name: Set ServiceNow stats
  ansible.builtin.set_stats:
    data:
      sn_manage_resources: "{{ _sn_configuration_items }}"
      sn_manage_relationships: "{{ _sn_ci_relationships }}"
