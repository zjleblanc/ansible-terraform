---
# When set to the full Terraform state dict (lookup(...)|from_json), the role builds
# tf_state_resources from ['values']['root_module'] (always bracket 'values'; .values is dict.values()).
# Optionally walks child_modules (see tf_state_cmdb_flatten_child_modules).
tf_state_json: null

# If true and tf_state_json is set, concatenate resources from every module in the tree.
# If false, only values.root_module.resources is used (same as slicing state yourself).
tf_state_cmdb_flatten_child_modules: true

# Terraform type keys for outer loops only (plain strings). Do not use sn_manage_resource_maps|list —
# Ansible still walks the dict and tries to template {{ _resource }} in sibling entries.
sn_manage_resource_map_types:
  - azurerm_resource_group
  - azurerm_virtual_network
  - azurerm_subnet
  - azurerm_linux_virtual_machine
  - azurerm_network_interface
  - azurerm_managed_disk

sn_manage_relationship_map_types:
  - azurerm_virtual_network
  - azurerm_subnet
  - azurerm_virtual_machine_data_disk_attachment

# Basenames under files/subelement_maps/ (one spec per file; avoids iterating a list of templated dicts).
sn_manage_relationship_subelement_spec_names:
  - azurerm_linux_virtual_machine_nics
  - azurerm_network_interface_subnets

# Built-in CMDB templates live under files/ci_maps/ and files/rel_maps/ (one Terraform type per file).
# Subelement specs: files/subelement_maps/. Defining sn_manage_resource_maps as a single dict in vars is not
# supported: Ansible merges/templates across keys and breaks {{ _resource }} scoping; override by editing those files or forking.
