---
- name: Terraform operations
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    tf_project_dir: "{{ playbook_dir | dirname }}"
    tf_workspace: "{{ lookup('ansible.builtin.env', 'TF_WORKSPACE') | default(false) }}"
    aap_workflow_url: "https://{{ aap_host | default('aap.example.com') }}/execution/jobs/workflow/{{ awx_workflow_job_id | default('-1') }}/output"
    aap_job_url: "https://{{ aap_host | default('aap.example.com') }}/execution/jobs/playbook/{{ awx_job_id | default('-1') }}/details"

  tasks:
    - name: Assert workspace provided
      ansible.builtin.assert:
        that: tf_workspace
        fail_msg: "ansible var tf_workspace or env var TF_WORKSPACE must be provided"

    - name: Terraform apply | create_web_demo
      register: r_tf_apply
      cloud.terraform.terraform:
        project_path: "{{ tf_project_dir }}"
        state: present
        force_init: true
        workspace: "{{ tf_workspace }}"
        variables:
          web_demo_ssh_pubkey: "{{ az_ssh_pubkey }}"
          web_vm_size: "{{ az_web_vm_size | default('Standard_DS1_v2') }}"
          sc_task: "{{ sc_task_created[inventory_hostname]['number'] | default('N/A')}}"
          aap_job_url: "{{ aap_job_url }}"
          aap_workflow_url: "{{ aap_workflow_url }}"

    - name: Terraform destroy | create_web_demo
      tags: [never, remove]
      register: r_tf_destroy
      cloud.terraform.terraform:
        project_path: "{{ tf_project_dir }}"
        state: absent
        force_init: true
        workspace: "{{ tf_workspace }}"
        variables:
          web_demo_ssh_pubkey: "{{ az_ssh_pubkey }}"
          web_vm_size: "{{ az_web_vm_size | default('Standard_DS1_v2') }}"
          sc_task: "{{ sc_task_created[inventory_hostname]['number'] | default('N/A')}}"
          aap_job_url: "{{ aap_job_url }}"
          aap_workflow_url: "{{ aap_workflow_url }}"

    - name: Prep stats for task update
      when: sc_task_created is defined and r_tf_apply is defined
      ansible.builtin.set_fact:
        _update_sc_task_sys_id: "{{ sc_task_created[inventory_hostname]['sys_id'] }}"
        _update_sc_task_data:
          work_notes:  >-
            [code]
            <p>Ansible Automation Platform Workflow:</p>
            <a href="{{ aap_workflow_url }}">View Workflow</a>
            <p>Ansible Automation Platform Job:</p>
            <a href="{{ aap_job_url }}">View Job</a>
            [/code]
            {{ r_tf_apply['outputs']['azure_web_demo_vm_details']['value'] | to_nice_json(indent=2) | codify }}
          close_notes: Terraform deployment completed
          state: 3 # Closed complete

    - name: Set stats for task update
      ansible.builtin.set_stats:
        data: >
          {
            "update_sc_task_sys_id": {
              "{{ inventory_hostname }}": "{{ _update_sc_task_sys_id }}"
            },
            "update_sc_task_data_overrides": {
              "{{ inventory_hostname }}": {{ _update_sc_task_data }}
            }
          }

    - name: Set stats for web server task create
      when: r_tf_apply is defined
      ansible.builtin.set_stats:
        data: >
          {
            "create_sc_task_data_overrides": {
              {% for vm in r_tf_apply['outputs']['azure_web_demo_vm_details']['value'] %}
              "{{ vm.name }}": {"short_description":"Ansible initiating configuration of {{ vm.name }}"}
              {% if not loop.last %},{% endif %}
              {% endfor %}
            }
          }
